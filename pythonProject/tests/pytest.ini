[pytest]
# -s отключает захват вывода: логи (print) и пояснения тестов видны в консоли во всех режимах, в т.ч. при -n 2
addopts = -v -s --tb=short --strict-markers
markers =
    regression: регрессионные тесты
    validation: тесты валидации полей
    negative: негативные тесты (ожидается ошибка API)
    test_name_ru: русское название теста для отчёта (параметр: строка)
    fast: быстрый (smoke) набор — один ключевой сценарий на метод
    slow: полный набор — все сценарии, включая негативные и граничные
    smoke: smoke-тесты, минимальные проверки работоспособности API
    order: порядок выполнения тестов (pytest-order, параметр: номер)
    rt_light: SLA времени ответа — лёгкие методы (≤ 1 с)
    rt_medium: SLA времени ответа — средние методы (≤ 3 с)
    rt_heavy: SLA времени ответа — тяжёлые методы (≤ 5 с)
pythonpath = .
    utils